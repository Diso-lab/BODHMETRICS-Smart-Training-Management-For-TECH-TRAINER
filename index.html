<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bodhmetrics — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <img src="logo.jpg" alt="BodhMetrics" style="width:64px;border-radius:14px;margin-bottom:6px;" />
      <div class="brand">BODHMETRICS</div>
      <p class="tagline">MEASURE. TRAIN. IMPROVE.</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">USERNAME</label>
          <input class="input" id="username" type="text" placeholder="Enter your username" required />
        </div>

        <div class="form-group">
          <label for="password">PASSWORD</label>
          <input class="input" id="password" type="password" placeholder="Enter your password" required />
        </div>

        <button type="submit" class="btn-primary">Sign In</button>

        <div style="margin-top:18px;text-align:center;">
          <a href="register.html" style="color:var(--blue);font-size:14px;font-weight:600;">
            Don't have an account? Register here →
          </a>
        </div>
        <p id="loginError" class="error"></p>
      </form>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
