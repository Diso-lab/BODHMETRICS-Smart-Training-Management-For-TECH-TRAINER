<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bodhmetrics — All Trainees</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="employees">

  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
      <div class="mobile-top">
        <img src="logo.jpg" alt="BodhMetrics" style="width:32px;border-radius:8px;" />
        <div class="brand">BODHMETRICS</div>
        <button class="icon-btn" id="logoutTop">Sign Out</button>
      </div>

      <header class="page-header">
        <div>
          <h1>Trainees</h1>
          <p>Manage and track all your registered trainees</p>
        </div>
      </header>

      <div class="separator"></div>

      <div class="table-card">
        <div class="card-header">
          <div class="filters">
            <button class="filter-chip active" data-filter="all">All</button>
            <button class="filter-chip" data-filter="good">High Performers</button>
            <button class="filter-chip" data-filter="average">Average</button>
            <button class="filter-chip" data-filter="needs-improvement">Needs Improvement</button>
          </div>
          <label class="search-box">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="employeeSearch" placeholder="Search trainee or role..." />
          </label>
        </div>
        <div id="employeeTable"></div>
        <div class="table-footer" id="employeeCount"></div>
      </div>
    </main>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
