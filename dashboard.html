<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bodhmetrics — Trainer Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="dashboard">

  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
      <div class="mobile-top">
        <img src="logo.jpg" alt="BodhMetrics" style="width:32px;border-radius:8px;" />
        <div class="brand">BODHMETRICS</div>
        <button class="icon-btn" id="logoutTop">Sign Out</button>
      </div>

      <header class="page-header">
        <div>
          <h1>Trainer Dashboard</h1>
          <p>Real-time overview of your trainees and program performance</p>
        </div>
        <div class="invite-code-box" id="inviteCodeBox">
          <div class="invite-label">YOUR TRAINER ID <span class="invite-tip">(Share with trainees)</span></div>
          <div class="invite-row">
            <code class="invite-id" id="inviteId">Loading...</code>
            <button class="copy-btn" id="copyInviteId" title="Copy ID">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </button>
          </div>
        </div>
      </header>

      <div class="separator"></div>

      <section class="stats-grid" id="statsGrid"></section>

      <section class="two-col">
        <div class="table-card">
          <div class="card-header">
            <div class="card-title">My Trainees</div>
            <div class="tools">
              <label class="search-box">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" id="dashboardSearch" placeholder="Search trainees..." />
              </label>
            </div>
          </div>
          <div id="dashboardTable"></div>
        </div>

        <aside class="panel-stack">
          <!-- Score Modal Inline -->
          <div class="form-card" id="scorePanel" style="display:none;">
            <h2>Assign Score</h2>
            <p class="muted-text" id="scoreTargetName"></p>
            <form id="scoreForm">
              <input type="hidden" id="scoreTargetId" />
              <div class="form-group">
                <label for="scoreInput">SCORE (0–100)</label>
                <input class="input" id="scoreInput" type="number" min="0" max="100" placeholder="e.g. 82" required />
              </div>
              <button type="submit" class="btn-primary">Assign Score</button>
              <button type="button" class="btn-secondary" id="cancelScore">Cancel</button>
            </form>
          </div>

          <!-- Queries Inbox -->
          <div class="form-card">
            <h2>💬 Trainee Queries</h2>
            <div class="query-list" id="trainerQueryList">
              <p class="muted-text">No queries yet.</p>
            </div>
          </div>
        </aside>
      </section>
    </main>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
